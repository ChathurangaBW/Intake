name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  qa:
    name: Lint, test, and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --quiet --upgrade pip build
          pip install --quiet -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        id: unit
        shell: bash
        run: |
          set +e
          pytest -q -m "unit or not (contract or integration or smoke)" --cov=intake --cov-report=term-missing --tb=short > unit-tests.log 2>&1
          code=$?
          tail -n 120 unit-tests.log
          exit "$code"
      - name: Upload unit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: unit-tests.log
      - name: Contract tests
        id: contract
        shell: bash
        run: |
          set +e
          pytest -q -m contract --tb=short > contract-tests.log 2>&1
          code=$?
          tail -n 160 contract-tests.log
          exit "$code"
      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-report
          path: contract-tests.log
      - name: Build Python distributions
        run: python -m build
      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: intake-python-dist
          path: dist/*

  security:
    name: Dependency and static security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and security tooling
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e .[dev]
      - name: Bandit
        shell: bash
        run: |
          set +e
          bandit -q -r src/intake > bandit.log 2>&1
          code=$?
          cat bandit.log
          exit "$code"
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit.log
      - name: Dependency audit
        shell: bash
        run: |
          set +e
          pip-audit > dependency-audit.log 2>&1
          code=$?
          cat dependency-audit.log
          exit "$code"
      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: dependency-audit.log

  compose-smoke:
    name: Clean-stack migration and worker smoke
    runs-on: ubuntu-latest
    needs: qa
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs
          exit 1
      - name: Run release smoke workflow
        run: bash scripts/smoke.sh
      - name: Show service state
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v

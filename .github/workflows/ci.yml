name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  qa:
    name: Lint, test, and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip build
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        run: pytest -m "unit or not (contract or integration or smoke)" --cov=intake --cov-report=term-missing
      - name: Contract tests
        run: pytest -m contract
      - name: Build Python distributions
        run: python -m build
      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: intake-python-dist
          path: dist/*

  security:
    name: Dependency and static security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Bandit
        run: bandit -q -r src/intake -s B603
      - name: Dependency audit
        run: pip-audit

  compose-smoke:
    name: Clean-stack migration and worker smoke
    runs-on: ubuntu-latest
    needs: qa
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose up -d --build
      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs
          exit 1
      - name: Run release smoke workflow
        run: bash scripts/smoke.sh
      - name: Show service state
        if: always()
        run: |
          docker compose ps
          docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down -v

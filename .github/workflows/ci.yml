name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Unit tests
        run: pytest -m "unit or not (contract or integration or smoke)" --cov=intake --cov-report=term-missing
      - name: Contract tests
        run: pytest -m contract
      - name: Build Docker image
        run: docker build -t intake:test .

name: publish-stable

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'docs/RELEASE_NOTES_*.md'
      - '.github/workflows/publish-stable.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: intake-stable-release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish stable Intake release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Resolve stable version
        id: version
        shell: bash
        run: |
          version="$(python - <<'PY'
          import pathlib, tomllib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to publish non-stable version: ${version}" >&2
            exit 1
          fi
          major="${version%%.*}"
          remainder="${version#*.}"
          minor="${remainder%%.*}"
          notes="docs/RELEASE_NOTES_${version}.md"
          test -f "${notes}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "major=${major}" >> "${GITHUB_OUTPUT}"
          echo "major_minor=${major}.${minor}" >> "${GITHUB_OUTPUT}"
          echo "notes=${notes}" >> "${GITHUB_OUTPUT}"

      - name: Check existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Release ${TAG} already exists; publication is idempotently skipped."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install build tooling
        if: steps.existing.outputs.exists != 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build and verify Python distributions
        if: steps.existing.outputs.exists != 'true'
        run: |
          python -m build
          python -m twine check dist/*

      - name: Attest Python distribution provenance
        if: steps.existing.outputs.exists != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - uses: docker/setup-buildx-action@v3
        if: steps.existing.outputs.exists != 'true'

      - name: Login to GHCR
        if: steps.existing.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish stable container
        if: steps.existing.outputs.exists != 'true'
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chathurangabw/intake:${{ steps.version.outputs.version }}
            ghcr.io/chathurangabw/intake:${{ steps.version.outputs.major_minor }}
            ghcr.io/chathurangabw/intake:${{ steps.version.outputs.major }}
            ghcr.io/chathurangabw/intake:latest
          labels: |
            org.opencontainers.image.title=Intake
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          provenance: mode=max
          sbom: true

      - name: Attest container provenance
        if: steps.existing.outputs.exists != 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/chathurangabw/intake
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Create version tag and GitHub release
        if: steps.existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Intake ${VERSION}" \
            --notes-file "${NOTES}" \
            --generate-notes

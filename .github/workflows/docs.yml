name: docs

on:
  pull_request:
    paths:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'assets/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate documentation structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs files
        run: |
          test -f README.md
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f assets/logo.svg
          test -f docs/index.html
          test -f docs/README.md
          test -f docs/APP_CAPABILITIES.md
          test -f docs/PROJECT_STATUS.md
          test -f docs/RELEASE_NOTES_1.0.0.md
          test -f docs/OPERATOR_CONSOLE.md
          test -f docs/SECURITY_BOUNDARY.md
          test -f docs/SUPPLY_CHAIN.md
          test -f docs/PACKAGING.md
          test -f docs/CONTAINER.md
          test -f docs/RELEASE.md
          test -f docs/BADGES.md
          test -f docs/QA.md
          test -f docs/OPERATIONS.md
          test -f docs/OPERATIONS_CONTROL_PLANE.md
          test -f docs/THREAT_MODEL.md
      - name: Reject stale release-candidate metadata
        run: |
          ! grep -RE "1\.0\.0-?rc1" pyproject.toml src/intake docs README.md CHANGELOG.md
